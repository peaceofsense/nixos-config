general {
    gaps_in = 2
    gaps_out = 2
    border_size = 2
    col.active_border = rgba(e81b85ee)
    col.inactive_border = rgba(000000aa)
    layout = scrolling
    resize_on_border = false
    allow_tearing = false
}

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 0.9

    blur {
        enabled = true
        size = 3
        passes = 3
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
    }
}

animations {
    enabled = true
    animation = global, 0, 4, default
    animation = workspaces, 0, 5, default, slidefade 10%
    animation = windows, 0, 6, default, slide
    animation = windowsMove, 0, 3, default
    animation = fade, 0, 4, default
    animation = fadeSwitch, 0, 3, default
    animation = border, 1, 2, default
    animation = borderangle, 0, 50, default
}

scrolling {
    fullscreen_on_one_column = true   # single column spans full screen
    column_width = 0.5                # default column width (0.1–1.0)
    focus_fit_method = 1              # 0 = center, 1 = fit
    follow_focus = true               # auto-scroll to focused window
    follow_min_visible = 0.4          # min fraction visible before following
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0  # cycle widths
}

#dwindle {
#    preserve_split = true
#    pseudotile = true
#}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = -1
}
